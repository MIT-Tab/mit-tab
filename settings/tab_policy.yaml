category:
  name: "Tab Policy"
  description: "Basic settings to set up tab for different tournament rules and sizes."
  id: "tab_policy"
  order: 3

settings:
  - tot_rounds:
    name: tot_rounds
    description: "The total number of preliminary rounds in the tournament"
    value: 5
  - nov_teams_to_break:
    name: nov_teams_to_break
    description: "The number of novice teams to be included in the break (exclusive of novice teams who are varsity breaking)"
    value: 4
  - var_teams_to_break:
    name: var_teams_to_break
    description: "The number of varsity teams to be included in the break."
    value: 8
  - nov_panel_size:
    name: nov_panel_size
    description: "The number of judges on a novice outs panel"
    value: 3
  - var_panel_size:
    name: var_panel_size
    description: "The number of judges on a varsity outs panel"
    value: 3
  - sidelock:
    name: sidelock
    description: "Toggle to indicate whether you are side-locking outrounds. When enabled, the gov/opp assignments for outrounds will not be random, but will adhere to sidelocks, and will be indicated on the pairing card and bolded on the front-facing pairing display."
    value: false
    type: boolean
  - choice:
    name: choice
    description: "Toggle to indicate whether you would like to display who has choice. When enabled, this will be indicated on the pairing card and bolded on the front-facing pairing display."
    value: false
    type: boolean
  - lenient_late:
    name: lenient_late
    description: "The latest round where people who do not show up are given average speaks instead of speaks of 0 by default. Note: This only applies before the round. If you change this after the round was paired, it will not take effect. You can manually allow a lenient_late in the admin interface."
    value: 0
  - enable_room_seeding:
    name: enable_room_seeding
    description: "Toggle to enable room seeding. When enabled, the best rooms go to the highest seeded rooms."
    value: true
    type: boolean
  - open_speaks:
    name: open_speaks
    description: "Whether judges should disclose speaker points to debaters (open = tell debaters their speaks; closed = do not). Leave unset if your tournament has no policy on this."
    value: 0
    type: choice
    choices:
      - [0, "Unset (No Policy)"]
      - [1, "Open (Disclose Speaks)"]
      - [2, "Closed (Do Not Disclose)"]
  - open_ranks:
    name: open_ranks
    description: "Whether judges should disclose ranks to debaters (open = disclose ranks if debaters opt-in; closed = do not). Leave unset if your tournament has no policy on this."
    value: 0
    type: choice
    choices:
      - [0, "Unset (No Policy)"]
      - [1, "Open (Disclose Ranks)"]
      - [2, "Closed (Do Not Disclose)"]
  - speaker_rankings_use_single_adjusted:
    name: speaker_rankings_use_single_adjusted
    description: "Use single adjusted speaker points before unadjusted speaker points when sorting speaker rankings. This does not change rank priority and does not affect team rankings or pairing."
    value: false
    type: boolean
  - written_rfd_first_round:
    name: written_rfd_first_round
    description: "The first preliminary round where judges' ballots include written reasons for decision. Use -1 to disable written RFDs."
    value: -1
  - written_rfd_deadline:
    name: written_rfd_deadline
    description: "Deadline for judges to edit written RFDs. This is interpreted in EST and applies to all rounds with written RFDs."
    value: ""
    type: datetime
