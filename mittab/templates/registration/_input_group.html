<div class="registration-field{% if compact %} registration-field--compact{% endif %} {{ margin|default:'' }}">
    <label class="registration-field__label"{% if field.id_for_label %} for="{{ field.id_for_label }}"{% endif %}>{{ label }}</label>
    {{ field }}
    {% if errors %}
    <div class="registration-field__error">{{ errors }}</div>
    {% endif %}
</div>
