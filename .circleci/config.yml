version: 2.1
orbs:
  codecov: codecov/codecov@1.0.4
  browser-tools: circleci/browser-tools@1.5.3
jobs:
  build:
    docker:
      - image: cimg/python:3.10.16
        environment:
          MYSQL_PASSWORD: secret
          MITTAB_DB_HOST: 127.0.0.1
          MITTAB_FAKE_WEBPACK_LOADER: "1"
          MITTAB_SKIP_ASSET_BUILD: "1"
          MITTAB_INITIALIZE_ARGS: --skip-backups
      - image: cimg/mysql:5.7
        environment:
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_DATABASE: mittab
          MYSQL_ROOT_HOST: 127.0.0.1

    parallelism: 4

    working_directory: ~/repo

    steps:
      - checkout
      - restore_cache:
          key: uv-v1-3.10.16-{{ checksum "uv.lock" }}

      - restore_cache:
          keys:
            - test-timing-v1-{{ .Branch }}-{{ .Revision }}
            - test-timing-v1-{{ .Branch }}-
            - test-timing-v1-
      
      - run:
          name: install dependencies
          command: |
            curl -LsSf https://astral.sh/uv/install.sh | sh
            echo 'export PATH="$HOME/.local/bin:$PATH"' >> "$BASH_ENV"
            export PATH="$HOME/.local/bin:$PATH"
            uv sync --frozen --all-groups --python 3.10.16

      - save_cache:
          paths:
            - ~/.cache/uv
          key: uv-v1-3.10.16-{{ checksum "uv.lock" }}

      - run:
          # Our primary container isn't MYSQL so run a sleep command until it's ready.
          name: Waiting for MySQL to be ready
          command: |
            for i in `seq 1 10`;
            do
              nc -z 127.0.0.1 3306 && echo Success && exit 0
              echo -n .
              sleep 1
            done
            echo Failed waiting for MySQL && exit 1

      - run:
          name: setup db
          command: |
            uv run --frozen ./bin/setup password

      - run:
          name: run tests
          command: |
            uv run --frozen pytest --junitxml=test-reports/junit.xml --cov=mittab --cov-report xml:cov.xml --ignore=mittab/libs/tests/web --circleci-parallelize mittab/
          no_output_timeout: 20m

      - save_cache:
          paths:
            - .test_durations
          key: test-timing-v1-{{ .Branch }}-{{ .Revision }}

      - store_test_results:
          path: test-reports

      - store_artifacts:
          path: test-reports
          destination: test-reports

      - codecov/upload:
          file: ./cov.xml
  web-tests:
    docker:
      - image: cimg/python:3.10.16-browsers
        environment:
          TEST_BROWSER: chrome
          MYSQL_PASSWORD: secret
          MITTAB_DB_HOST: 127.0.0.1
          MITTAB_FAKE_WEBPACK_LOADER: "1"
          MITTAB_INITIALIZE_ARGS: --skip-backups
          MITTAB_SKIP_WEBPACK_BUILD: "1"
      - image: cimg/mysql:5.7
        environment:
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_DATABASE: mittab
          MYSQL_ROOT_HOST: 127.0.0.1

    working_directory: ~/repo
    parallelism: 2

    steps:
      - checkout
      - restore_cache:
          key: uv-v1-3.10.16-{{ checksum "uv.lock" }}

      - restore_cache:
          keys:
            - test-timing-v1-{{ .Branch }}-{{ .Revision }}
            - test-timing-v1-{{ .Branch }}-
            - test-timing-v1-

      - browser-tools/install-chrome
      - browser-tools/install-chromedriver
      - run:
          name: install dependencies
          command: |
            sudo mkdir -p /tmp/disabled-apt-sources
            sudo find /etc/apt/sources.list.d -maxdepth 1 -type f \
              -exec mv {} /tmp/disabled-apt-sources/ \;
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends default-mysql-client
            curl -LsSf https://astral.sh/uv/install.sh | sh
            echo 'export PATH="$HOME/.local/bin:$PATH"' >> "$BASH_ENV"
            export PATH="$HOME/.local/bin:$PATH"
            uv sync --frozen --all-groups --python 3.10.16

      - save_cache:
          paths:
            - ~/.cache/uv
          key: uv-v1-3.10.16-{{ checksum "uv.lock" }}

      - run:
          # Our primary container isn't MYSQL so run a sleep command until it's ready.
          name: Waiting for MySQL to be ready
          command: |
            for i in `seq 1 10`;
            do
              nc -z 127.0.0.1 3306 && echo Success && exit 0
              echo -n .
              sleep 1
            done
            echo Failed waiting for MySQL && exit 1

      - run:
          name: setup db
          command: |
            uv run --frozen ./bin/setup password

      - run:
          name: run web tests
          command: |
            uv run --frozen pytest --junitxml=test-reports/junit.xml --cov=mittab --cov-report xml:cov-web.xml --circleci-parallelize mittab/libs/tests/web/
          no_output_timeout: 20m

      - save_cache:
          paths:
            - .test_durations
          key: test-timing-v1-{{ .Branch }}-{{ .Revision }}

      - store_test_results:
          path: test-reports

      - store_artifacts:
          path: test-reports
          destination: test-reports

      - codecov/upload:
          file: ./cov-web.xml
  lint:
    docker:
      - image: cimg/python:3.10.16-node
    steps:
      - checkout
      - restore_cache:
          key: uv-v1-3.10.16-{{ checksum "uv.lock" }}
      - restore_cache:
          key: npm-v1-{{ checksum "package-lock.json" }}
      - run:
          name: install dependencies
          command: |
            curl -LsSf https://astral.sh/uv/install.sh | sh
            echo 'export PATH="$HOME/.local/bin:$PATH"' >> "$BASH_ENV"
            export PATH="$HOME/.local/bin:$PATH"
            uv sync --frozen --all-groups --python 3.10.16
            npm ci --prefer-offline --no-audit
      - save_cache:
          paths:
            - ~/.cache/uv
          key: uv-v1-3.10.16-{{ checksum "uv.lock" }}
      - save_cache:
          paths:
            - ~/.npm
          key: npm-v1-{{ checksum "package-lock.json" }}
      - run:
          name: Lint -- Python
          command: |
            uv run --frozen pylint mittab
      - run:
          name: Lint -- JS
          command: npm run lint
  docs:
    docker:
      - image: cimg/python:3.10.16
    steps:
      - checkout
      - restore_cache:
          keys:
            - uv-docs-v1-3.10.16-{{ checksum "uv.lock" }}
            - uv-docs-v1-3.10.16-
      - run:
          name: install dependencies
          command: |
            curl -LsSf https://astral.sh/uv/install.sh | sh
            echo 'export PATH="$HOME/.local/bin:$PATH"' >> "$BASH_ENV"
            export PATH="$HOME/.local/bin:$PATH"
            uv sync --frozen --group docs --python 3.10.16
      - save_cache:
          paths:
            - ~/.cache/uv
          key: uv-docs-v1-3.10.16-{{ checksum "uv.lock" }}
      - run:
          name: Build docs
          command: |
            cd docs
            mkdir -p _static
            uv run --frozen --group docs make html
      - run:
          name: Check links
          command: |
            cd docs
            uv run --frozen --group docs make linkcheck
  docker-build:
    machine:
      image: default
    steps:
      - checkout
      - run:
          name: Build and test Dockerfile
          command: |
            docker build -t mittab:test -f Dockerfile .
      - run:
          name: Verify Python version matches pyproject
          command: |
            EXPECTED_VERSION=$(sed -n 's/requires-python = ">=\(.*\),<3.11"/\1/p' pyproject.toml)
            ACTUAL_VERSION=$(docker run --rm mittab:test python --version | awk '{print $2}')
            echo "Expected Python version: $EXPECTED_VERSION"
            echo "Actual Python version: $ACTUAL_VERSION"
            if [ "$EXPECTED_VERSION" != "$ACTUAL_VERSION" ]; then
              echo "ERROR: Python version mismatch!"
              echo "pyproject.toml requires $EXPECTED_VERSION but Dockerfile has $ACTUAL_VERSION"
              exit 1
            fi
            echo "Python versions match!"
workflows:
  version: 2
  build_and_lint:
    jobs:
      - lint
      - build
      - web-tests
      - docs
      - docker-build
