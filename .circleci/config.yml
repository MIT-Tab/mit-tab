version: 2.1
orbs:
  codecov: codecov/codecov@1.0.4
  browser-tools: circleci/browser-tools@1.5.3
jobs:
  build:
    docker:
      - image: cimg/python:3.10.16
        environment:
          MYSQL_PASSWORD: secret
          MITTAB_DB_HOST: 127.0.0.1
          PIPENV_VENV_IN_PROJECT: true
          MITTAB_FAKE_WEBPACK_LOADER: "1"
          MITTAB_SKIP_ASSET_BUILD: "1"
          MITTAB_INITIALIZE_ARGS: --skip-backups
      - image: cimg/mysql:5.7
        environment:
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_DATABASE: mittab
          MYSQL_ROOT_HOST: 127.0.0.1

    parallelism: 4

    working_directory: ~/repo

    steps:
      - checkout
      - restore_cache:
          key: deps-v3-3.10.16-{{ checksum "Pipfile.lock" }}

      - restore_cache:
          keys:
            - test-timing-v1-{{ .Branch }}-{{ .Revision }}
            - test-timing-v1-{{ .Branch }}-
            - test-timing-v1-
      
      - run:
          name: install dependencies
          command: |
            if [ ! -d .venv ]; then
              pipenv --python 3.10.16
            fi
            pipenv sync --dev

      - save_cache:
          paths:
            - .venv
          key: deps-v3-3.10.16-{{ checksum "Pipfile.lock" }}

      - run:
          # Our primary container isn't MYSQL so run a sleep command until it's ready.
          name: Waiting for MySQL to be ready
          command: |
            for i in `seq 1 10`;
            do
              nc -z 127.0.0.1 3306 && echo Success && exit 0
              echo -n .
              sleep 1
            done
            echo Failed waiting for MySQL && exit 1

      - run:
          name: setup db
          command: |
            pipenv run ./bin/setup password

      - run:
          name: run tests
          command: |
            pipenv run pytest --junitxml=test-reports/junit.xml --cov=mittab --cov-report xml:cov.xml --ignore=mittab/libs/tests/web --circleci-parallelize mittab/
          no_output_timeout: 20m

      - save_cache:
          paths:
            - .test_durations
          key: test-timing-v1-{{ .Branch }}-{{ .Revision }}

      - store_test_results:
          path: test-reports

      - store_artifacts:
          path: test-reports
          destination: test-reports

      - codecov/upload:
          file: ./cov.xml
  web-tests:
    docker:
      - image: cimg/python:3.10.16-node
        environment:
          TEST_BROWSER: chrome
          MYSQL_PASSWORD: secret
          MITTAB_DB_HOST: 127.0.0.1
          PIPENV_VENV_IN_PROJECT: true
          MITTAB_NPM_INSTALL_COMMAND: npm ci --prefer-offline --no-audit
      - image: cimg/mysql:5.7
        environment:
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_DATABASE: mittab
          MYSQL_ROOT_HOST: 127.0.0.1

    working_directory: ~/repo
    parallelism: 2

    steps:
      - checkout
      - restore_cache:
          key: deps-v3-3.10.16-{{ checksum "Pipfile.lock" }}

      - restore_cache:
          keys:
            - test-timing-v1-{{ .Branch }}-{{ .Revision }}
            - test-timing-v1-{{ .Branch }}-
            - test-timing-v1-

      - browser-tools/install-chrome
      - browser-tools/install-chromedriver
      - run:
          name: install dependencies
          command: |
            sudo mkdir -p /tmp/disabled-apt-sources
            sudo find /etc/apt/sources.list.d -maxdepth 1 -type f \
              -exec mv {} /tmp/disabled-apt-sources/ \;
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends default-mysql-client
            if [ ! -d .venv ]; then
              pipenv --python 3.10.16
            fi
            pipenv sync --dev

      - save_cache:
          paths:
            - .venv
          key: deps-v3-3.10.16-{{ checksum "Pipfile.lock" }}

      - run:
          # Our primary container isn't MYSQL so run a sleep command until it's ready.
          name: Waiting for MySQL to be ready
          command: |
            for i in `seq 1 10`;
            do
              nc -z 127.0.0.1 3306 && echo Success && exit 0
              echo -n .
              sleep 1
            done
            echo Failed waiting for MySQL && exit 1

      - run:
          name: setup db
          command: |
            pipenv run ./bin/setup password

      - run:
          name: run web tests
          command: |
            pipenv run pytest --junitxml=test-reports/junit.xml --cov=mittab --cov-report xml:cov-web.xml --circleci-parallelize mittab/libs/tests/web/
          no_output_timeout: 20m

      - save_cache:
          paths:
            - .test_durations
          key: test-timing-v1-{{ .Branch }}-{{ .Revision }}

      - store_test_results:
          path: test-reports

      - store_artifacts:
          path: test-reports
          destination: test-reports

      - codecov/upload:
          file: ./cov-web.xml
  lint:
    docker:
      - image: cimg/python:3.10.16-node
        environment:
          PIPENV_VENV_IN_PROJECT: true
    steps:
      - checkout
      - restore_cache:
          key: deps-v3-3.10.16-{{ checksum "Pipfile.lock" }}
      - restore_cache:
          key: npm-v1-{{ checksum "package-lock.json" }}
      - run:
          name: install dependencies
          command: |
            if [ ! -d .venv ]; then
              pipenv --python 3.10.16
            fi
            pipenv sync --dev
            npm ci --prefer-offline --no-audit
      - save_cache:
          paths:
            - .venv
          key: deps-v3-3.10.16-{{ checksum "Pipfile.lock" }}
      - save_cache:
          paths:
            - ~/.npm
          key: npm-v1-{{ checksum "package-lock.json" }}
      - run:
          name: Lint -- Python
          command: |
            pipenv run pylint mittab
      - run:
          name: Lint -- JS
          command: npm run lint
  docs:
    docker:
      - image: cimg/python:3.10.16
    steps:
      - checkout
      - restore_cache:
          keys:
            - v3-docs-dependencies-{{ checksum "docs/requirements.txt" }}
            - v3-docs-dependencies-
      - run:
          name: install dependencies
          command: |
            python -m venv venv
            . venv/bin/activate
            pip install --disable-pip-version-check -r docs/requirements.txt
      - save_cache:
          paths:
            - ./venv
          key: v3-docs-dependencies-{{ checksum "docs/requirements.txt" }}
      - run:
          name: Build docs
          command: |
            . venv/bin/activate
            cd docs
            mkdir -p _static
            make html
      - run:
          name: Check links
          command: |
            . venv/bin/activate
            cd docs
            make linkcheck
  docker-build:
    machine:
      image: default
    steps:
      - checkout
      - run:
          name: Build and test Dockerfile
          command: |
            docker build -t mittab:test -f Dockerfile .
      - run:
          name: Verify Python version matches Pipfile
          command: |
            EXPECTED_VERSION=$(grep python_version Pipfile | sed 's/.*"\(.*\)".*/\1/')
            ACTUAL_VERSION=$(docker run --rm mittab:test python --version | awk '{print $2}')
            echo "Expected Python version: $EXPECTED_VERSION"
            echo "Actual Python version: $ACTUAL_VERSION"
            if [ "$EXPECTED_VERSION" != "$ACTUAL_VERSION" ]; then
              echo "ERROR: Python version mismatch!"
              echo "Pipfile requires $EXPECTED_VERSION but Dockerfile has $ACTUAL_VERSION"
              exit 1
            fi
            echo "Python versions match!"
workflows:
  version: 2
  build_and_lint:
    jobs:
      - lint
      - build
      - web-tests
      - docs
      - docker-build
